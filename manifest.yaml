AddonId: GamepadToKeyboard
Packages:
  - Version: 1.0.1
    RequiredApiVersion: 6.0.0
    ReleaseDate: 2026-02-15
    PackageUrl: https://github.com/roob-p/GamepadToKeyboard-PlayniteExtension/releases/download/v1.0.1/GamepadToKeyboard_v1.0.1.pext
    Changelog: 
      - Initial release
  - Version: 1.2.1
    RequiredApiVersion: 6.0.0
    ReleaseDate: 2026-05-27
    PackageUrl: https://github.com/roob-p/GamepadToKeyboard-PlayniteExtension/releases/download/v1.2.1/GamepadToKeyboard_v1.2.1.pext
    Changelog:
      - New update comes with improvements and new features.
      - "--- Modifiers: ---"
      - "Toggle, Turbo, TurboToggle"
      - "Execute - launch programs"
      - "Combo - send multiple keypresses"
      - "ComboAsync - send multiple keys with delay"
      - "ToggleCombo, TurboCombo, TurboToggleCombo"
      - "Sequence - sends keys in sequence (no hold)"
      - "-----------------"
      - Added circular deadzone support (with and without rescaling) in addition to the square/rectangular one.
      - Mouse wheel supports both digital (when assigned to a button) and analog (when assigned to a stick or trigger) input.
      - Dedicated repeat variables have also been added (do not use Turbo-based modifiers).
      - Added splash text when reloading the config.
      - "SendKeysType now supports only two values.  1 Game mode,  2 Desktop mode (with Windows-style keypress delay and repeat)"
      - Improved input management and better Desktop mode compatibility.
      - Improved button release cleanup on exit.
      - Code optimized, fixed and restructured.
  - Version: 1.2.2
    RequiredApiVersion: 6.0.0
    ReleaseDate: 2026-06-01
    PackageUrl: https://github.com/roob-p/GamepadToKeyboard-PlayniteExtension/releases/download/v1.2.2/GamepadToKeyboard_v1.2.2.pext
    Changelog:
      - Fixed the issue where some special keys (LCtrl, LAlt, LWin, RCtrl, RAlt, RWin) remained stuck when pressed.
      - Fixed mouse wheel repeat functionality (this fix was already included in the corrected v1.2.1 package uploaded shortly after 1.2.1 release, but some users may still have downloaded the original version).
  - Version: 1.2.3
    RequiredApiVersion: 6.0.0
    ReleaseDate: 2026-06-10
    PackageUrl: https://github.com/roob-p/GamepadToKeyboard-PlayniteExtension/releases/download/v1.2.3/GamepadToKeyboard_v1.2.3.pext
    Changelog:
      - Added Text modifier - send up to 200 characters (not intended for games).
      - Added some missing variables to the reload function, which could cause missing reload of assignments using Sequence modifier.
  - Version: 1.2.4
    RequiredApiVersion: 6.0.0
    ReleaseDate: 2026-06-19
    PackageUrl: https://github.com/roob-p/GamepadToKeyboard-PlayniteExtension/releases/download/v1.2.4/GamepadToKeyboard_v1.2.4.pext
    Changelog:
      - "Added new modifiers:"
      - "[Hold]: perform different actions depending on how long the button is held. Short press sends the 1st key, medium press sends the 2nd key, long press sends the 3rd key. (e.g. [Hold] a, b, c)"
      - "[FastPress]: repeatedly press the button to cycle through the keys to send (define the keys after the modifier, e.g. [FastPress] a, b, c). The cycling time window is defined by FastPressTime in [Other]"
      - "[Shift]: add a set of keys (up to 5, e.g. `[Shift] a, b, c, d, e`) and switch between them using the ShiftMode modifiers:"
      - "[ShiftMode]: press and hold to change the active Shift key (define the target key number after the modifier, e.g. [ShiftMode] 3)"
      - "[ShiftModeToggle]: same as above, but the button acts as a toggle"
      - "[ShiftModeCycle-], [ShiftModeCyle+] or [ShiftModeCyle]: cycle through the available Shift keys. These modifiers do not require a value (e.g. LT = [ShiftModeCyle+])"
      - ShiftMode modifiers can also be activated via configurable keyboard hotkeys.
      - Added keyboard hotkey support for ShiftMode modifiers. See GamepadToKeyboard.config. 
      - "---Default hotkey:---"
      - "ShiftModeCycle-: Ctrl Shift 7"
      - "ShiftModeCycle+: Ctrl Shift 8"
      - "ShiftModeToggle: Ctrl Shift 9"
      - "---------------------"
      - "Added a live stats system (default hotkey: Ctrl Shift 6)"